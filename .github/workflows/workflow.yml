name: Deploy Entire Infra

on:
  push:
    branches: ["dev", "main", "feat-dev", "master"]
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action to run"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Create terraform.tfvars
        working-directory: ./terraform
        run: |
          cat > terraform.tfvars <<EOF
          region                = "${{ secrets.AWS_REGION }}"
          ami                   = "${{ secrets.AMI_ID }}"
          instance_type         = "${{ secrets.INSTANCE_TYPE }}"
          instance-name-nginx   = "${{ secrets.INSTANCE_NAME_NGINX }}"
          vpc_name              = "${{ secrets.VPC_NAME }}"
          key_name              = "${{ secrets.KEY_NAME }}"
          EOF

      - name: Terraform Init
        working-directory: ./terraform
        env:
          TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
        run: terraform init -upgrade


      - name: Verify AWS account and IAM roles
        working-directory: ./terraform
        env:
          TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
        run: |
          aws sts get-caller-identity
          aws iam get-role --role-name kunle-vpc-eks-node-role || true
          aws iam get-role --role-name kunle-vpc-eks-cluster-role || true


      - name: Terraform Format Check
        working-directory: ./terraform 
        env:
          TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
        run: |
          ls -ltar
          terraform import aws_iam_role.eks_nodes kunle-vpc-eks-node-role
          terraform import aws_iam_role.eks_cluster kunle-vpc-eks-cluster-role


      - name: Terraform Validate
        working-directory: ./terraform
        env:
          TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
        run: terraform validate

      - name: Stage 1 Plan EKS
        working-directory: ./terraform
        env:
          TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
        run: |
          terraform plan \
            -target=aws_eks_cluster.main \
            -target=aws_eks_node_group.main \
            -target=aws_eks_access_entry.ci_admin \
            -target=aws_eks_access_policy_association.ci_admin_policy \
            -target=aws_eks_access_entry.node_role \
            -out=tfplan-eks

      - name: Stage 1 Apply EKS
        working-directory: ./terraform
        env:
          TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
        run: terraform apply -auto-approve tfplan-eks

      - name: Wait for node group
        run: |
          aws eks wait nodegroup-active \
            --cluster-name "${{ secrets.VPC_NAME }}-cluster" \
            --nodegroup-name main-nodes \
            --region "${{ secrets.AWS_REGION }}"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.VPC_NAME }}-cluster" \
            --region "${{ secrets.AWS_REGION }}"
          kubectl get nodes || true

      - name: Stage 2 Full Plan
        working-directory: ./terraform
        env:
          TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
        run: terraform plan -out=tfplan

      - name: Stage 2 Full Apply
        working-directory: ./terraform
        env:
          TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
        run: terraform apply -auto-approve tfplan