name: Deploy Entire Infra

on:
  push:
    branches: ["dev", "main", "feat-dev", "master"]
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action to run"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4 

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Create terraform.tfvars 
        working-directory: ./terraform
        shell: bash
        run: |
          cat > terraform.tfvars <<EOF
          region                = "${{ secrets.AWS_REGION }}"
          ami                   = "${{ secrets.AMI_ID }}"
          instance_type         = "${{ secrets.INSTANCE_TYPE }}"
          instance-name-nginx   = "${{ secrets.INSTANCE_NAME_NGINX }}"
          vpc_name              = "${{ secrets.VPC_NAME }}"
          key_name              = "${{ secrets.KEY_NAME }}"
          EOF
 

      - name: Clean up Kubernetes Load Balancers before destroy 
        shell: bash
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"

          echo "Deleting all LoadBalancer services to release AWS ELBs..."
          kubectl delete svc --all -n banking --field-selector spec.type=LoadBalancer || echo "None found"

          echo "Waiting 60s for ELBs to be released by AWS..."
          sleep 60

          echo "Ready for Terraform destroy"

      # - name: Terraform Plan (Destroy) 
      #   working-directory: ./terraform
      #   run: terraform plan -destroy -out=tfplan

      # - name: Terraform Destroy 
      #   working-directory: ./terraform
      #   run: terraform apply -auto-approve tfplan


      - name: Terraform Init
        working-directory: ./terraform
        env:
          TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
        run: | 
          terraform init   
          #terraform state rm aws_eks_node_group.main
          #terraform state list | grep -E 'kubernetes_|helm_release|aws_eks_' || true
          terraform state list | grep -E 'kubernetes_|helm_release|aws_eks_|data.aws_eks_' || true
              terraform state rm helm_release.ingress_nginx || true
              terraform state rm kubernetes_ingress_v1.bank_frontend || true
          #terraform state rm \
            #aws_eks_cluster.main \
            #aws_eks_access_entry.ci_admin \
            #aws_eks_access_entry.node_role \
            #aws_eks_access_policy_association.ci_admin_policy \
            #aws_iam_openid_connect_provider.eks \
            #aws_iam_role.aws_load_balancer_controller \
            #aws_iam_role.ebs_csi_role \
            #aws_iam_role.eks_cluster \
            #aws_iam_role.eks_nodes\ 
            #aws_eks_cluster.main \ 
            #kubernetes_namespace_v1.ingress_nginx \
            #kubernetes_service_v1.bank_frontend \
            #helm_release.aws_load_balancer_controller \
            #helm_release.ebs_csi_driver \
            #helm_release.ingress_nginx \
            #kubernetes_ingress_v1.bank_frontend
          terraform state rm helm_release.ingress_nginx || true
          terraform state rm kubernetes_ingress_v1.bank_frontend || true




      - name: Terraform Init-2
        working-directory: ./terraform
        env:
          TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
        run: | 
          terraform init  
          terraform plan  -out=tfplan       # see what changes Terraform will make

                    terraform init
          terraform state list || true

          terraform state rm data.aws_eks_cluster.main || true
          terraform state rm data.aws_eks_cluster_auth.main || true

          terraform state list || true
          
          terraform apply -target=aws_eks_cluster.main \
            -target=aws_iam_openid_connect_provider.eks \
            -target=aws_iam_role.aws_load_balancer_controller \
            -target=aws_iam_role.ebs_csi_role \
            -target=aws_eks_access_entry.ci_admin \
            -target=aws_eks_access_entry.node_role \
            -target=aws_eks_access_policy_association.ci_admin_policy \
            --auto-approve
 
          terraform destroy --auto-approve
          #terraform import kubernetes_service_v1.bank_frontend banking/bank-frontend


