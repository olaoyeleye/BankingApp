name: Destroy Entire Infra

on:
  push:
    branches: [ "main", "feat-dev", "master" ]
  workflow_dispatch:


permissions:
  contents: read
  id-token: write

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Verify AWS identity
      shell: bash
      run: aws sts get-caller-identity

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Create terraform.tfvars
      working-directory: ./terraform
      shell: bash
      run: |
        cat > terraform.tfvars <<EOF
        region                = "${{ secrets.AWS_REGION }}"
        ami                   = "${{ secrets.AMI_ID }}"
        instance_type         = "${{ secrets.INSTANCE_TYPE }}"
        instance-name-nginx   = "${{ secrets.INSTANCE_NAME_NGINX }}"
        vpc_name              = "${{ secrets.VPC_NAME }}"
        key_name              = "${{ secrets.KEY_NAME }}"
        EOF

    - name: Download AWS Load Balancer Controller IAM Policy
      working-directory: ./terraform
      shell: bash
      run: |
        curl -Lo iam_policy.json https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/main/docs/install/iam_policy.json

    - name: Terraform Init
      working-directory: ./terraform
      env:
        TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
      run: terraform init -reconfigure

    - name: Install kubectl and Helm
      shell: bash
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    - name: Update kubeconfig for EKS
      shell: bash
      run: |
        aws eks update-kubeconfig --name "${{ secrets.EKS_CLUSTER_NAME }}" --region "${{ secrets.AWS_REGION }}" || true

    - name: Remove ALB, ingress, and Kubernetes resources
      shell: bash
      env:
        TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
      run: | 
        kubectl delete ingress --all -A --ignore-not-found || true
        kubectl delete svc --all -A --field-selector spec.type=LoadBalancer --ignore-not-found || true
        kubectl delete ns banking ingress-nginx --ignore-not-found || true
        helm uninstall aws-load-balancer-controller -n kube-system --ignore-not-found || true
        helm uninstall aws-ebs-csi-driver -n kube-system --ignore-not-found || true
        helm uninstall ingress-nginx -n ingress-nginx --ignore-not-found || true
        sleep 60

    - name: Clear Pre-existing Addon Conflicts
      run: |
        aws eks delete-nodegroup \
          --cluster-name tai-key-cluster \
          --nodegroup-name main-nodes \
          --region eu-west-1
        aws eks delete-addon \
          --cluster-name ${{ secrets.EKS_CLUSTER_NAME }} \
          --addon-name aws-ebs-csi-driver \
          --region ${{ secrets.AWS_REGION }} || echo "Addon not found, moving on..."
          
        aws eks wait addon-deleted \
          --cluster-name ${{ secrets.EKS_CLUSTER_NAME }} \
          --addon-name aws-ebs-csi-driver \
          --region ${{ secrets.AWS_REGION }} || echo "Done waiting."

    - name: Cleanup EKS security groups in AWS
      shell: bash
      run: |
        set -euo pipefail

        REGION="${AWS_REGION:-eu-west-1}"
        SG_NAMES=("tai-key-nodes-sg" "eks-cluster-sg-tai-key-cluster")

        for SG_NAME in "${SG_NAMES[@]}"; do
          SG_ID=$(aws ec2 describe-security-groups \
            --region "$REGION" \
            --filters Name=group-name,Values="$SG_NAME" \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null || true)

          if [ -z "$SG_ID" ] || [ "$SG_ID" = "None" ]; then
            echo "Security group $SG_NAME not found, skipping"
            continue
          fi

          echo "Checking dependencies for $SG_NAME ($SG_ID)"

          ENIS=$(aws ec2 describe-network-interfaces \
            --region "$REGION" \
            --filters Name=group-id,Values="$SG_ID" \
            --query 'NetworkInterfaces[].NetworkInterfaceId' \
            --output text || true)

          if [ -n "${ENIS// /}" ]; then
            echo "Found ENIs attached to $SG_ID: $ENIS"
            for ENI in $ENIS; do
              echo "Deleting ENI $ENI"
              aws ec2 delete-network-interface --region "$REGION" --network-interface-id "$ENI" || true
            done
          fi

          echo "Deleting security group $SG_NAME ($SG_ID)"
          aws ec2 delete-security-group --region "$REGION" --group-id "$SG_ID" || true
        done
      env:
        AWS_REGION: eu-west-1
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Remove state entries for manually deleted resources
      working-directory: ./terraform
      env:
        TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
      shell: bash
      run: | 
        terraform state rm aws_security_group.public_kunle_sg || true
        terraform state rm eks-cluster-sg-tai-key-cluster* || true
        terraform state rm aws_eks_node_group.main || true
        terraform state rm aws_eks_cluster.main || true
        terraform state rm kubernetes_namespace_v1.banking || true
        terraform state rm kubernetes_namespace_v1.ingress_nginx || true
        terraform state rm kubernetes_service_v1.bank_frontend || true
        terraform state rm kubernetes_ingress_v1.bank_frontend || true
        terraform state rm helm_release.ebs_csi_driver || true
        terraform state rm helm_release.ingress_nginx || true
        terraform state rm aws_iam_policy.aws_load_balancer_controller || true
        terraform state rm aws_iam_role.aws_load_balancer_controller || true
        terraform state rm helm_release.aws_load_balancer_controller || true

    - name: Remove Kubernetes-managed security groups
      shell: bash
      run: |
        VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=${{ secrets.VPC_NAME }}" --query 'Vpcs[0].VpcId' --output text 2>/dev/null || true)

        if [ -n "$VPC_ID" ]; then
          echo "Looking for Kubernetes-related security groups in VPC $VPC_ID"
          for SG in $(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "SecurityGroups[?contains(GroupName, 'eks') || contains(GroupName, 'k8s') || contains(GroupName, 'cluster') || contains(GroupName, 'nodes')].GroupId" \
            --output text 2>/dev/null); do
            echo "Deleting security group $SG"
            aws ec2 delete-security-group --group-id "$SG" --region "${{ secrets.AWS_REGION }}" || true
          done
        else
          echo "VPC not found for ${{ secrets.VPC_NAME }}; skipping security group cleanup"
        fi

        sleep 30

    - name: Terraform Plan Destroy
      working-directory: ./terraform
      shell: bash
      run: terraform plan -destroy -out=destroy.tfplan

    - name: Terraform Destroy
      working-directory: ./terraform
      shell: bash
      env:
        TF_VAR_eks_admin_principal_arn: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARN }}
      run: terraform apply -auto-approve destroy.tfplan
