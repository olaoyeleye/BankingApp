---
# - name: Ensure required packages are installed
#   ansible.builtin.dnf:
#     name:
#       - unzip
#       - git
#       - curl
#     state: present
- name: Ensure required packages are installed
  ansible.builtin.shell: |
    dnf install -y --allowerasing curl git unzip
  changed_when: false


- name: Install AWS CLI v2
  ansible.builtin.shell: |
    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
    unzip -o /tmp/awscliv2.zip -d /tmp
    /tmp/aws/install --update
  args:
    creates: /usr/local/bin/aws

- name: Get latest kubectl version
  ansible.builtin.uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: yes
  register: kubectl_version

- name: Download kubectl binary
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"

- name: Install Helm
  ansible.builtin.shell: |
    curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 /tmp/get_helm.sh
    /tmp/get_helm.sh
  args:
    creates: /usr/local/bin/helm

# - name: Configure kubeconfig for EKS
#   ansible.builtin.shell: |
#     mkdir -p /home/ec2-user/.kube
#     aws eks update-kubeconfig \
#       --name "{{ eks_cluster_name }}" \
#       --region "{{ aws_region }}" \
#       --kubeconfig /home/ec2-user/.kube/config
#   become_user: ec2-user
#   environment:
#     HOME: /home/ec2-user
#     AWS_DEFAULT_REGION: "{{ aws_region }}"
- name: Configure kubeconfig for EKS
  ansible.builtin.shell: |
    mkdir -p /home/ec2-user/.kube
    aws eks update-kubeconfig \
      --name "{{ eks_cluster_name }}" \
      --region "{{ aws_region }}" \
      --kubeconfig /home/ec2-user/.kube/config
  become: yes
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"


- name: Verify cluster access
  ansible.builtin.command: kubectl get nodes
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  changed_when: false

- name: Add ingress-nginx Helm repo
  kubernetes.core.helm_repository:
    name: ingress-nginx
    repo_url: https://kubernetes.github.io/ingress-nginx
  environment:
    KUBECONFIG: /home/ec2-user/.kube/config
    HOME: /home/ec2-user
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"

- name: Ensure Helm directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"
  loop:
    - /home/ec2-user/.config
    - /home/ec2-user/.config/helm
    - /home/ec2-user/.cache
    - /home/ec2-user/.cache/helm
    - /home/ec2-user/.cache/helm/repository
    - /home/ec2-user/.local
    - /home/ec2-user/.local/share
    - /home/ec2-user/.local/share/helm

- name: Remove stale Helm cache files
  ansible.builtin.file:
    path: /home/ec2-user/.cache/helm/repository
    state: absent

- name: Recreate Helm cache directories
  ansible.builtin.file:
    path: /home/ec2-user/.cache/helm/repository
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Fix Helm config ownership
  ansible.builtin.file:
    path: /home/ec2-user/.config/helm
    state: directory
    owner: ec2-user
    group: ec2-user
    recurse: yes

- name: Install ingress-nginx controller
  kubernetes.core.helm:
    name: ingress-nginx
    chart_ref: ingress-nginx/ingress-nginx
    release_namespace: ingress-nginx
    create_namespace: true
    update_repo_cache: true
    wait: true
    timeout: 5m
    state: present
  become: yes
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    XDG_CONFIG_HOME: /home/ec2-user/.config
    XDG_CACHE_HOME: /home/ec2-user/.cache
    XDG_DATA_HOME: /home/ec2-user/.local/share
    HELM_CONFIG_HOME: /home/ec2-user/.config/helm
    HELM_CACHE_HOME: /home/ec2-user/.cache/helm
    HELM_DATA_HOME: /home/ec2-user/.local/share/helm
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"

- name: Create k8s directory on EC2
  ansible.builtin.file:
    path: /home/ec2-user/k8s
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Copy k8s manifests to EC2
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../k8s/{{ item }}"
    dest: "/home/ec2-user/k8s/{{ item }}"
    owner: ec2-user
    group: ec2-user
    mode: "0644"
  loop:
    - namespace.yml
    - secret.yml
    - configmap.yml
    - storageclass.yml
    - postgres.yml
    - redis.yml
    - kafka.yml
    - user-service.yml
    - transaction-service.yml
    - activity-service.yml
    - ingress.yml
    - datadog-agent.yml









- name: Add Datadog Helm repo
  ansible.builtin.command: helm repo add datadog https://helm.datadoghq.com
  register: dd_repo_add
  failed_when: dd_repo_add.rc not in [0]
  changed_when: "'has been added' in dd_repo_add.stdout or dd_repo_add.rc == 0"

- name: Update Helm repo
  ansible.builtin.command: helm repo update
  changed_when: false

- name: Install python3 and pip3
  become: true
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-setuptools
    state: present

- name: Install Python dependencies for kubernetes.core
  become: true
  ansible.builtin.pip:
    name:
      - kubernetes
      - pyyaml
      - jsonpatch
    executable: pip3

