---
# - name: Ensure required packages are installed
#   ansible.builtin.dnf:
#     name:
#       - unzip
#       - git
#       - curl
#     state: present
- name: Ensure required packages are installed
  ansible.builtin.shell: |
    dnf install -y --allowerasing curl git unzip
  changed_when: false


- name: Install AWS CLI v2
  ansible.builtin.shell: |
    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
    unzip -o /tmp/awscliv2.zip -d /tmp
    /tmp/aws/install --update
  args:
    creates: /usr/local/bin/aws

- name: Get latest kubectl version
  ansible.builtin.uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: yes
  register: kubectl_version

- name: Download kubectl binary
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"

- name: Install Helm
  ansible.builtin.shell: |
    curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 /tmp/get_helm.sh
    /tmp/get_helm.sh
  args:
    creates: /usr/local/bin/helm

# - name: Configure kubeconfig for EKS
#   ansible.builtin.shell: |
#     mkdir -p /home/ec2-user/.kube
#     aws eks update-kubeconfig \
#       --name "{{ eks_cluster_name }}" \
#       --region "{{ aws_region }}" \
#       --kubeconfig /home/ec2-user/.kube/config
#   become_user: ec2-user
#   environment:
#     HOME: /home/ec2-user
#     AWS_DEFAULT_REGION: "{{ aws_region }}"
- name: Configure kubeconfig for EKS
  ansible.builtin.shell: |
    mkdir -p /home/ec2-user/.kube
    aws eks update-kubeconfig \
      --name "{{ eks_cluster_name }}" \
      --region "{{ aws_region }}" \
      --kubeconfig /home/ec2-user/.kube/config
  become: yes
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"

    
- name: Verify cluster access
  ansible.builtin.command: kubectl get nodes
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  changed_when: false

- name: Add ingress-nginx Helm repo
  kubernetes.core.helm_repository:
    name: ingress-nginx
    repo_url: https://kubernetes.github.io/ingress-nginx
  environment:
    KUBECONFIG: /home/ec2-user/.kube/config
    HOME: /home/ec2-user

- name: Install ingress-nginx controller
  kubernetes.core.helm:
    name: ingress-nginx
    chart_ref: ingress-nginx/ingress-nginx
    release_namespace: ingress-nginx
    create_namespace: true
    update_repo_cache: true
    wait: true
    timeout: 900
    state: present
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_DEFAULT_REGION: "{{ aws_region }}"

- name: Create k8s directory on EC2
  ansible.builtin.file:
    path: /home/ec2-user/k8s
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Copy k8s manifests to EC2
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/home/ec2-user/k8s/{{ item | basename }}"
    owner: ec2-user
    group: ec2-user
    mode: "0644"
  loop:
    - "{{ role_path }}/files/k8s/namespace.yml"
    - "{{ role_path }}/files/k8s/secret.yml"
    - "{{ role_path }}/files/k8s/configmap.yml"
    - "{{ role_path }}/files/k8s/storageclass.yml"
    - "{{ role_path }}/files/k8s/postgres.yml"
    - "{{ role_path }}/files/k8s/redis.yml"
    - "{{ role_path }}/files/k8s/kafka.yml"
    - "{{ role_path }}/files/k8s/user-service.yml"
    - "{{ role_path }}/files/k8s/transaction-service.yml"
    - "{{ role_path }}/files/k8s/activity-service.yml"
    - "{{ role_path }}/files/k8s/ingress.yml"

- name: Replace app images
  ansible.builtin.replace:
    path: "/home/ec2-user/k8s/{{ item.file }}"
    regexp: "{{ item.search }}"
    replace: "{{ item.value }}"
  loop:
    - { file: "user-service.yml", search: "YOUR_ECR_URL/user-service:latest", value: "{{ user_service_image }}" }
    - { file: "transaction-service.yml", search: "YOUR_ECR_URL/transaction-service:latest", value: "{{ transaction_service_image }}" }
    - { file: "activity-service.yml", search: "YOUR_ECR_URL/activity-service:latest", value: "{{ activity_service_image }}" }
    - { file: "postgres.yml", search: "YOUR_ECR_URL/bank-app-postgres:latest", value: "{{ postgres_image }}" }

- name: Fix StorageClass
  ansible.builtin.shell: |
    kubectl delete storageclass gp2 --ignore-not-found=true
    sleep 5
    kubectl apply -f /home/ec2-user/k8s/storageclass.yml
    kubectl get storageclass
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  register: sc_fix

- name: Clean up old banking namespace
  ansible.builtin.shell: kubectl delete namespace banking --ignore-not-found=true
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_DEFAULT_REGION: "{{ aws_region }}"

- name: Apply infrastructure
  ansible.builtin.shell: |
    kubectl apply -f /home/ec2-user/k8s/namespace.yml
    kubectl apply -f /home/ec2-user/k8s/secret.yml
    kubectl apply -f /home/ec2-user/k8s/configmap.yml
    kubectl apply -f /home/ec2-user/k8s/postgres.yml
    kubectl apply -f /home/ec2-user/k8s/redis.yml
    kubectl apply -f /home/ec2-user/k8s/kafka.yml
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_DEFAULT_REGION: "{{ aws_region }}"

- name: Apply app services
  ansible.builtin.shell: |
    kubectl apply -f /home/ec2-user/k8s/user-service.yml
    kubectl apply -f /home/ec2-user/k8s/transaction-service.yml
    kubectl apply -f /home/ec2-user/k8s/activity-service.yml
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_DEFAULT_REGION: "{{ aws_region }}"

- name: Apply ingress resource
  ansible.builtin.shell: kubectl apply -f /home/ec2-user/k8s/ingress.yml
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_DEFAULT_REGION: "{{ aws_region }}"