---
- name: Ensure required packages are installed
  dnf:
    name:
      - unzip
      - git
    state: present

- name: Install AWS CLI v2
  shell: |
    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
    unzip -o /tmp/awscliv2.zip -d /tmp
    /tmp/aws/install --update
  args:
    creates: /usr/local/bin/aws

- name: Get latest kubectl version
  uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: yes
  register: kubectl_version

- name: Download kubectl binary
  get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'
    force: false

- name: Verify kubectl installed
  command: kubectl version --client
  register: kubectl_out
  changed_when: false

- name: Print kubectl version
  debug:
    msg: "{{ kubectl_out.stdout }}"

# ← FIX 1: use hostvars/vars not lookup('env') — env vars aren't passed to shell
- name: Configure kubeconfig for EKS
  shell: |
    mkdir -p /home/ec2-user/.kube
    aws eks update-kubeconfig \
      --name "{{ eks_cluster_name }}" \
      --region "{{ aws_region }}" \
      --kubeconfig /home/ec2-user/.kube/config
  become: yes
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"

- name: Set kubeconfig permissions
  file:
    path: /home/ec2-user/.kube/config
    owner: ec2-user
    group: ec2-user
    mode: '0600'
  ignore_errors: true

- name: Create k8s directory on EC2
  file:
    path: /home/ec2-user/k8s
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Copy k8s manifests to EC2
  copy:
    src: "{{ playbook_dir }}/../k8s/"
    dest: /home/ec2-user/k8s/
    owner: ec2-user
    group: ec2-user
    mode: '0644'

# ← FIX 2: all three services use app_image variable passed via --extra-vars
- name: Set app image in user-service.yml
  ansible.builtin.replace:
    path: /home/ec2-user/k8s/user-service.yml
    regexp: 'YOUR_ECR_URL/user-service:latest'
    replace: "{{ user_service_image }}"

- name: Set app image in transaction-service.yml
  ansible.builtin.replace:
    path: /home/ec2-user/k8s/transaction-service.yml
    regexp: 'YOUR_ECR_URL/transaction-service:latest'
    replace: "{{ transaction_service_image }}"

- name: Set app image in activity-service.yml
  ansible.builtin.replace:
    path: /home/ec2-user/k8s/activity-service.yml
    regexp: 'YOUR_ECR_URL/activity-service:latest'
    replace: "{{ activity_service_image }}"


- name: Deploy infrastructure to Kubernetes
  shell: |
    kubectl apply -f /home/ec2-user/k8s/namespace.yml
    kubectl apply -f /home/ec2-user/k8s/secrets.yml
    kubectl apply -f /home/ec2-user/k8s/configmap.yml
    kubectl apply -f /home/ec2-user/k8s/postgres.yml
    kubectl apply -f /home/ec2-user/k8s/redis.yml
    kubectl apply -f /home/ec2-user/k8s/kafka.yml
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  register: infra_apply

- name: Print infra apply output
  debug:
    msg: "{{ infra_apply.stdout }}"

- name: Check PVC and storage status
  shell: |
    echo "=== Applying StorageClass ==="
    kubectl apply -f /home/ec2-user/k8s/storageclass.yml
    
    echo "=== Verify StorageClass ==="
    kubectl get storageclass

    echo "=== Applying namespace and configs ===" 
    kubectl get storageclass
    echo "=== PVC Status ==="
    kubectl get pvc -n banking
    echo "=== Postgres Pod Events ==="
    kubectl describe pod -l app=postgres -n banking | tail -20
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  register: pvc_debug

- name: Print PVC debug
  debug:
    msg: "{{ pvc_debug.stdout }}"





- name: Wait for postgres
  shell: kubectl wait --for=condition=ready pod -l app=postgres -n banking --timeout=180s
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user 
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  register: postgres_wait
  ignore_errors: true

- name: Wait for redis
  shell: kubectl wait --for=condition=ready pod -l app=redis -n banking --timeout=120s
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  register: redis_wait
  ignore_errors: true

- name: Wait for kafka
  shell: kubectl wait --for=condition=ready pod -l app=kafka -n banking --timeout=300s
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  register: kafka_wait
  ignore_errors: true

- name: Check pod status if wait failed
  shell: kubectl get pods -n banking
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  register: pod_status

- name: Print pod status
  debug:
    msg: "{{ pod_status.stdout }}"

- name: Deploy app services to Kubernetes
  shell: |
    kubectl apply -f /home/ec2-user/k8s/user-service.yml
    kubectl apply -f /home/ec2-user/k8s/transaction-service.yml
    kubectl apply -f /home/ec2-user/k8s/activity-service.yml
    kubectl get all -n banking
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  register: services_apply

- name: Print services apply output
  debug:
    msg: "{{ services_apply.stdout }}"

- name: Get service URLs
  shell: |
    echo "=== User Service ==="
    kubectl get service user-service -n banking \
      -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || echo "not ready"
    echo "=== Transaction Service ==="
    kubectl get service transaction-service -n banking \
      -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || echo "not ready"
    echo "=== Activity Service ==="
    kubectl get service activity-service -n banking \
      -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || echo "not ready"
  become_user: ec2-user
  environment:
    HOME: /home/ec2-user
    KUBECONFIG: /home/ec2-user/.kube/config
    AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ aws_region }}"
  register: service_urls
  ignore_errors: true

- name: Print service URLs
  debug:
    msg: "{{ service_urls.stdout }}"