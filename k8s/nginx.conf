server {
    listen 80;
    server_name _; 

    # ==============================================================================
    # 1. Route Static Frontend Assets
    # ==============================================================================
    location / {
        proxy_pass http://<FRONTEND_K8S_LOADBALANCER_DNS>:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==============================================================================
    # 2. Route Java User Service API requests
    # ==============================================================================
    location /api/v1/users/ {
        # Strips the /api/v1/users/ prefix and forwards the call down to Tomcat/Spring on port 8080
        proxy_pass http://<JAVA_USER_SERVICE_K8S_LOADBALANCER_DNS>:8080/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}